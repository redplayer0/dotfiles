# If a config.py file exists, this file is ignored unless it's explicitly loaded
# via config.load_autoconfig(). For more information, see:
# https://github.com/qutebrowser/qutebrowser/blob/master/doc/help/configuring.asciidoc#loading-autoconfigyml
# DO NOT edit this file by hand, qutebrowser will overwrite it.
# Instead, create a config.py - see :help for details.

config_version: 2
settings:
  bindings.commands:
    global:
      normal:
        gl: set-cmd-text :spawn pass generate -c {url:host}/
        zl: spawn --userscript qute_pass --dmenu-invocation "dmenu -l 5 -p 'login
          as:'"
  content.autoplay:
    global: false
  content.blocking.method:
    global: both
  content.notifications.enabled:
    global: false
    https://www.netflix.com: false
  content.register_protocol_handler:
    https://mail.google.com?extsrc=mailto&url=%25s: false
    https://mail.protonmail.com#mailto=%25s: false
  new_instance_open_target:
    global: window
  qt.highdpi:
    global: true
  scrolling.smooth:
    global: true
  spellcheck.languages:
    global: null
  statusbar.padding:
    global:
      bottom: 1
      left: 1
      right: 1
      top: 1
  tabs.last_close:
    global: startpage
  url.auto_search:
    global: naive
  url.default_page:
    global: https://search.brave.com/
  url.open_base_url:
    global: false
  url.searchengines:
    global:
      DEFAULT: https://search.brave.com/search?q={}
  url.start_pages:
    global: https://search.brave.com
